# The URL the site will be built for
base_url = "https://ezrantn.github.io"
theme = "hook"
title = "Ezra Natanael"
description = "Software Engineer based in Jakarta, Indonesia"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

taxonomies = [{ name = "categories" }, { name = "tags" }]

[markdown]

# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
highlight_theme = "agola-dark"

[extra]
# Put all your custom variables here

links = [
    { title = "Mail", href = "mailto:ezrantn@proton.me" },
    { title = "GitHub", href = "https://github.com/ezrantn" },
    { title = "LinkedIn", href = "https://www.linkedin.com/in/ezrantn" },
]
